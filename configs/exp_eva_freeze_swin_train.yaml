experiment:
  name: "eva02_frozen"
  output_dir: "outputs/eva02_frozen"

model:
  backbone: "eva02_large_patch14_336" # timm
  img_size: 336
  pretrained: true
  freeze_backbone: true
  head:
    name: "mlp"
    out_dim: 1000
    hidden_dim: 2048
    dropout: 0.2

augmentations:
  train:
  - name: "RandomResizedCrop"
    size: 336
    scale: [ 0.7, 1.0 ]
  - name: "HorizontalFlip"
    p: 0.5
  - name: "ToTensor"
  - name: "Normalize"
    mean: [ 0.485, 0.456, 0.406 ]
    std: [ 0.229, 0.224, 0.225 ]
  val:
  - name: "Resize"
    size: 384
  - name: "CenterCrop"
    size: 336
  - name: "ToTensor"
  - name: "Normalize"
    mean: [ 0.485, 0.456, 0.406 ]
    std: [ 0.229, 0.224, 0.225 ]

train:
  epochs: 3
optimizer:
  lr: 0.0001
